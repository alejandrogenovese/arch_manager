# Alembic config para Arch Manager.
# En v1 usamos Base.metadata.create_all() en el lifespan, pero para producción
# real (OCP) este alembic.ini permite gestionar migraciones versionadas.
[alembic]
script_location = alembic
sqlalchemy.url = postgresql+psycopg://archmanager:archmanager@localhost:5432/archmanager
prepend_sys_path = .
version_path_separator = os
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
