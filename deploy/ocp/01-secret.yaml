---
# Secret con valores sensibles.
#
# Crear ANTES de aplicar el Deployment:
#
#   oc -n arch-manager create secret generic arch-manager-secret \
#     --from-literal=SESSION_SECRET="$(openssl rand -base64 48)" \
#     --from-literal=DATABASE_URL="postgresql+psycopg://USER:PASS@HOST:5432/DB" \
#     --from-literal=SEED_DEFAULT_PASSWORD="<password-inicial>"
#
# Este archivo es solo TEMPLATE — NO commitear con valores reales.
# Para entornos productivos del banco usar External Secrets Operator
# o Vault Agent Injector y reemplazar este Secret.
apiVersion: v1
kind: Secret
metadata:
  name: arch-manager-secret
  namespace: arch-manager
  labels:
    app.kubernetes.io/name: arch-manager
type: Opaque
stringData:
  SESSION_SECRET: "REPLACE-ME-with-`openssl rand -base64 48`"
  DATABASE_URL:   "postgresql+psycopg://archmanager:REPLACE@arch-manager-pg:5432/archmanager"
  SEED_DEFAULT_PASSWORD: "REPLACE-ME"
