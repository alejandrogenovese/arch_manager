---
# Deployment del BFF (que también sirve el SPA estático).
#
# Decisiones:
#   - 2 réplicas → tolerancia a fallos básica + rolling sin downtime.
#   - SCC restricted-v2 friendly: runAsNonRoot, no privileged, no hostPath,
#     readOnlyRootFilesystem (con un emptyDir para /tmp).
#   - Probes apuntan a /healthz (liveness) y /readyz (readiness con DB).
#   - Resources conservadores — ajustar después con métricas reales.
#   - imagePullPolicy: IfNotPresent + tag inmutable (NO latest) para que
#     un rollback funcione.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arch-manager
  namespace: arch-manager
  labels:
    app.kubernetes.io/name: arch-manager
    app.kubernetes.io/component: bff
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: arch-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arch-manager
        app.kubernetes.io/component: bff
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bff
          image: image-registry.openshift-image-registry.svc:5000/arch-manager/arch-manager:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: arch-manager-config
            - secretRef:
                name: arch-manager-secret
          # Probes
          startupProbe:        # Da margen al boot inicial (lifespan + create_all)
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24      # 2 minutos de gracia
          livenessProbe:       # ¿El proceso responde?
            httpGet: { path: /healthz, port: http }
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:      # ¿Listo para recibir tráfico? (verifica DB)
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      terminationGracePeriodSeconds: 30
